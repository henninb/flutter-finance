name: flutter_finance
description: Personal finance management mobile application
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1

  # Networking
  dio: ^5.9.1
  pretty_dio_logger: ^1.4.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Security
  flutter_secure_storage: ^10.0.0

  # UI/UX
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0

  # Navigation
  go_router: ^17.2.3

  # Utilities
  intl: ^0.20.2
  logger: ^2.4.0
  uuid: ^4.4.2
  equatable: ^2.0.8

  # Image
  image_picker: ^1.1.2
  image: ^4.2.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  mockito: ^5.6.3
  build_runner: ^2.10.5

  # App icon generation
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
